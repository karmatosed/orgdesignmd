  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

E9DE;\n    --acid-green-1:#33F078; --acid-green-2:#C7FFDB; --acid-green-3:#E2FFED;\n    --lemon-1:#FFF972; --lemon-2:#FFFCB5; --lemon-3:#FFFDD6;\n    --purple-1:#5300BE; --purple-2:#7A00DF; --purple-3:#D7A7FF;\n    /* Tints + section surfaces */\n    --tint-blue:#EFF2FF; --tint-green:#C7FFDB; --tint-coral:#FFE9DE;\n    --news-surface:#F8F3EC; --news-beige:#E4DDD4; --news-blue:#3E58E1;\n    --about-surface:#F0EDE7;\n    --events-map-sky:#AADAFF;\n    --plugins-star:#FFB900;\n    /* Type stacks */\n    --serif:\"EB Garamond\", Georgia, serif;\n    --sans:\"Inter\", system-ui, sans-serif;\n    --mono:\"IBM Plex Mono\", ui-monospace, monospace;\n    --type-courier:\"Courier Prime\", ui-monospace, monospace;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: var(--sans);\n    color: var(--charcoal-1);\n    background: var(--white);\n    -webkit-font-smoothing: antialiased;\n    line-height: 1.6;\n  }\n\n  .page { max-width: 1240px; margin: 0 auto; padding: 0 40px; }\n\n  /* ─── HERO ──────────────────────────────────────── */\n  .hero {\n    background: var(--charcoal-1);\n    color: var(--white);\n    padding: 80px 0 96px;\n  }\n  .hero .page { display: grid; grid-template-columns: 1fr 360px; gap: 60px; align-items: end; }\n  .hero .eyebrow {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--blueberry-2);\n    margin: 0 0 18px;\n  }\n  .hero h1 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 100px;\n    line-height: 0.95;\n    margin: 0 0 24px;\n    letter-spacing: -0.02em;\n  }\n  .hero h1 em { font-style: italic; color: var(--blueberry-3); }\n  .hero .lede {\n    font-size: 18px; line-height: 1.6;\n    color: var(--light-grey-1);\n    max-width: 640px;\n    margin: 0;\n  }\n  .hero .meta {\n    border-left: 1px solid var(--charcoal-3);\n    padding-left: 30px;\n    font-family: var(--mono);\n    font-size: 11px;\n    line-height: 1.8;\n    color: var(--charcoal-5);\n  }\n  .hero .meta dt { color: var(--charcoal-5); margin-top: 14px; }\n  .hero .meta dt:first-child { margin-top: 0; }\n  .hero .meta dd { margin: 0; color: var(--white); }\n  .hero .meta dd a { color: var(--blueberry-2); text-decoration: none; }\n\n  /* ─── SECTIONS ──────────────────────────────────── */\n  section { padding: 80px 0; border-bottom: 1px solid var(--light-grey-1); }\n  section:last-of-type { border-bottom: 0; }\n\n  .section-head {\n    display: grid;\n    grid-template-columns: 200px 1fr;\n    gap: 60px;\n    margin-bottom: 50px;\n    align-items: baseline;\n  }\n  .section-num {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--charcoal-4);\n  }\n  .section-num strong { color: var(--primary); font-weight: 500; margin-right: 8px; }\n  .section-head h2 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 50px;\n    line-height: 1.05;\n    margin: 0 0 12px;\n    letter-spacing: -0.01em;\n  }\n  .section-head p {\n    margin: 0;\n    max-width: 720px;\n    color: var(--charcoal-3);\n    font-size: 16px;\n  }\n\n  .subhead {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--charcoal-4);\n    margin: 50px 0 18px;\n    padding-bottom: 8px;\n    border-bottom: 1px solid var(--light-grey-1);\n  }\n  .subhead:first-child { margin-top: 0; }\n\n  /* ─── COLOR SWATCHES ────────────────────────────── */\n  .swatch-grid {\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    gap: 10px;\n  }\n  .swatch-grid.dense { grid-template-columns: repeat(8, 1fr); gap: 8px; }\n  .swatch {\n    border-radius: 2px;\n    overflow: hidden;\n    border: 1px solid var(--light-grey-1);\n    background: var(--white);\n  }\n  .swatch .chip {\n    height: 76px;\n    display: flex;\n    align-items: flex-end;\n    padding: 8px 10px;\n  }\n  .swatch .label {\n    padding: 8px 10px 10px;\n    font-family: var(--mono);\n    font-size: 10px;\n    line-height: 1.4;\n    color: var(--charcoal-2);\n    background: var(--white);\n  }\n  .swatch .label .name { display: block; color: var(--charcoal-1); }\n  .swatch .label .hex { color: var(--charcoal-4); }\n  .swatch.dark .chip + .label { border-top: 1px solid var(--light-grey-1); }\n\n  /* badges grid: smaller */\n  .badge-grid {\n    display: grid;\n    grid-template-columns: repeat(8, 1fr);\n    gap: 6px;\n  }\n  .badge-grid .badge-cell {\n    padding: 10px 12px;\n    border-radius: 2px;\n    font-family: var(--mono);\n    font-size: 10px;\n    line-height: 1.5;\n    color: white;\n    text-shadow: 0 1px 0 rgba(0,0,0,0.18);\n    min-height: 64px;\n    display: flex;\n    flex-direction: column;\n    justify-content: space-between;\n  }\n  .badge-grid .name { font-size: 10px; opacity: 0.95; }\n  .badge-grid .hex  { font-size: 9px; opacity: 0.75; }\n  .badge-grid .badge-cell.light { color: var(--charcoal-1); text-shadow: none; }\n  .badge-grid .badge-cell.light .hex { opacity: 0.55; }\n\n  /* ─── TYPOGRAPHY ────────────────────────────────── */\n  .type-row {\n    display: grid;\n    grid-template-columns: 240px 1fr 220px;\n    gap: 40px;\n    padding: 26px 0;\n    border-bottom: 1px solid var(--light-grey-1);\n    align-items: baseline;\n  }\n  .type-row .name {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--charcoal-3);\n  }\n  .type-row .name small {\n    display: block;\n    font-family: var(--sans);\n    font-size: 11px;\n    letter-spacing: 0;\n    text-transform: none;\n    color: var(--charcoal-4);\n    margin-top: 4px;\n    font-weight: 400;\n  }\n  .type-row .sample { color: var(--charcoal-1); }\n  .type-row .spec {\n    font-family: var(--mono);\n    font-size: 10.5px;\n    color: var(--charcoal-4);\n    line-height: 1.7;\n  }\n  .type-row .spec .v { color: var(--charcoal-1); }\n\n  .t-display-cta  { font-family:var(--serif); font-size:120px; font-weight:400; line-height:1; letter-spacing:-0.02em; }\n  .t-headline-1   { font-family:var(--serif); font-size:70px;  font-weight:400; line-height:1.05; letter-spacing:-0.02em; }\n  .t-headline-2   { font-family:var(--serif); font-size:50px;  font-weight:400; line-height:1.2; }\n  .t-headline-3   { font-family:var(--serif); font-size:36px;  font-weight:400; line-height:1.28; }\n  .t-headline-4   { font-family:var(--serif); font-size:30px;  font-weight:400; line-height:1.33; }\n  .t-headline-5   { font-family:var(--serif); font-size:26px;  font-weight:400; line-height:1.3; }\n  .t-headline-6   { font-family:var(--serif); font-size:22px;  font-weight:400; line-height:1.27; }\n  .t-body-lg      { font-family:var(--sans);  font-size:20px;  font-weight:400; line-height:1.7; }\n  .t-body-md      { font-family:var(--sans);  font-size:16px;  font-weight:400; line-height:1.875; }\n  .t-body-sm      { font-family:var(--sans);  font-size:14px;  font-weight:400; line-height:1.714; }\n  .t-body-xs      { font-family:var(--sans);  font-size:12px;  font-weight:400; line-height:1.67; }\n  .t-label-md     { font-family:var(--sans);  font-size:16px;  font-weight:600; line-height:1.3; }\n  .t-label-nav    { font-family:var(--sans);  font-size:16px;  font-weight:400; line-height:1.3; }\n  .t-code         { font-family:var(--mono);  font-size:14px;  font-weight:400; line-height:1.5; }\n\n  /* ─── SPACING & SHAPES ──────────────────────────── */\n  .two-col {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 60px;\n  }\n  .spacing-list, .radius-list {\n    list-style: none; padding: 0; margin: 0;\n  }\n  .spacing-list li, .radius-list li {\n    display: grid;\n    grid-template-columns: 80px 1fr 100px;\n    align-items: center;\n    padding: 14px 0;\n    border-bottom: 1px solid var(--light-grey-1);\n    font-family: var(--mono);\n    font-size: 12px;\n  }\n  .spacing-list .name, .radius-list .name { color: var(--charcoal-1); }\n  .spacing-list .vis {\n    height: 14px;\n    background: var(--primary);\n    border-radius: 2px;\n  }\n  .radius-list .vis {\n    height: 56px;\n    width: 56px;\n    background: var(--primary);\n    border: 1px solid var(--dark-blueberry);\n  }\n  .spacing-list .val, .radius-list .val { color: var(--charcoal-4); text-align: right; }\n\n  .width-bars { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }\n  .width-bars .bar {\n    position: relative;\n    height: 28px;\n    background: var(--light-grey-2);\n    border-radius: 2px;\n    overflow: hidden;\n  }\n  .width-bars .bar .fill {\n    height: 100%;\n    background: var(--blueberry-3);\n    border-right: 2px solid var(--primary);\n  }\n  .width-bars .bar .lbl {\n    position: absolute; inset: 0;\n    display: flex; align-items: center;\n    padding: 0 12px;\n    font-family: var(--mono);\n    font-size: 11px;\n    color: var(--charcoal-1);\n    justify-content: space-between;\n  }\n\n  /* ─── COMPONENTS ────────────────────────────────── */\n  .comp-grid {\n    display: grid;\n    grid-template-columns: repeat(12, 1fr);\n    gap: 20px;\n  }\n  .comp {\n    grid-column: span 4;\n    border: 1px solid var(--light-grey-1);\n    border-radius: 2px;\n    padding: 24px;\n    background: var(--white);\n  }\n  .comp.span-6 { grid-column: span 6; }\n  .comp.span-12 { grid-column: span 12; }\n  .comp.span-8 { grid-column: span 8; }\n  .comp-title {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--charcoal-4);\n    margin: 0 0 16px;\n  }\n\n  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--sans); font-size: 16px; font-weight: 600; line-height: 1.3; padding: 14px 32px; border-radius: 2px; border: 1px solid transparent; cursor: pointer; text-decoration: none; }\n  .btn.primary { background: var(--primary); color: var(--white); }\n  .btn.primary:hover { background: var(--deep-blueberry); }\n  .btn.outline { background: transparent; color: var(--primary); border-color: var(--primary); }\n  .btn.outline-dark { background: transparent; color: var(--white); border-color: var(--white); }\n  .btn.success { background: #008A20; color: var(--white); } /* learn-success-50 */\n\n  .btn-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }\n\n  .input {\n    display: block; width: 100%;\n    font-family: var(--sans); font-size: 14px;\n    color: var(--charcoal-1);\n    background: var(--light-grey-2);\n    border: 1px solid transparent;\n    border-radius: 2px;\n    padding: 12px 16px;\n  }\n  .input::placeholder { color: var(--charcoal-4); }\n  .input.solid { background: var(--white); border-color: var(--light-grey-1); }\n\n  .chip { display: inline-flex; align-items: center; gap: 6px; font-family: var(--sans); font-size: 12px; line-height: 1; padding: 6px 12px; border-radius: 999px; }\n  .chip.blueberry { background: var(--blueberry-4); color: var(--charcoal-1); }\n  .chip.green { background: var(--acid-green-2); color: var(--charcoal-1); }\n  .chip.coral { background: var(--pomegrade-3); color: var(--charcoal-1); }\n  .chip.lemon { background: var(--lemon-3); color: var(--charcoal-1); }\n  .chip.dark { background: var(--charcoal-1); color: var(--white); }\n  .chip.acid { background: var(--acid-green-1); color: var(--charcoal-1); }\n  .chip.outline { background: var(--white); color: var(--charcoal-3); border: 1px solid var(--light-grey-1); }\n\n  .callout { background: var(--blueberry-4); border-radius: 8px; padding: 30px; }\n  .callout h4 { font-family: var(--serif); font-weight: 400; font-size: 22px; margin: 0 0 8px; }\n  .callout p { font-family: var(--sans); font-size: 14px; color: var(--charcoal-3); margin: 0; }\n\n  .card-directory {\n    background: var(--white);\n    border-radius: 8px;\n    padding: 20px;\n    border: 1px solid var(--light-grey-1);\n    display: grid;\n    grid-template-columns: 56px 1fr;\n    gap: 16px;\n  }\n  .card-directory .icon {\n    width: 56px; height: 56px; border-radius: 2px;\n    background: linear-gradient(135deg, var(--primary), var(--purple-2));\n  }\n  .card-directory .title { font-family: var(--sans); font-size: 16px; font-weight: 600; margin: 0 0 4px; }\n  .card-directory .stars { color: var(--plugins-star); font-size: 12px; letter-spacing: 1px; }\n  .card-directory .meta { font-family: var(--sans); font-size: 12px; color: var(--charcoal-4); margin-top: 8px; }\n\n  .syntax-row { display: flex; flex-wrap: wrap; gap: 8px; }\n  .syntax {\n    font-family: var(--mono);\n    font-size: 11px;\n    padding: 3px 8px;\n    border-radius: 2px;\n    color: var(--white);\n  }\n  .syntax.fn { background: #008A20; }\n  .syntax.hook { background: #D63638; }\n  .syntax.class { background: #BD8600; }\n  .syntax.method { background: #135E96; }\n\n  .notice {\n    display: flex; gap: 14px;\n    padding: 16px 20px;\n    border-radius: 2px;\n    font-family: var(--sans);\n    font-size: 14px;\n  }\n  .notice + .notice { margin-top: 8px; }\n  .notice .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }\n  .notice.success { background: var(--acid-green-3); color: var(--charcoal-1); }\n  .notice.success .dot { background: #00D084; }\n  .notice.info { background: var(--blueberry-4); color: var(--charcoal-1); }\n  .notice.info .dot { background: var(--primary); }\n  .notice.warn { background: var(--lemon-3); color: var(--charcoal-1); }\n  .notice.warn .dot { background: #C8A100; }\n  .notice.error { background: var(--pomegrade-3); color: var(--charcoal-1); }\n  .notice.error .dot { background: var(--pomegrade-1); }\n\n  .code-block {\n    background: var(--charcoal-2);\n    color: var(--white);\n    font-family: var(--mono);\n    font-size: 12.5px;\n    line-height: 1.7;\n    border-radius: 4px;\n    padding: 20px 24px;\n  }\n  .code-block .tk-key { color: var(--blueberry-2); }\n  .code-block .tk-str { color: var(--acid-green-2); }\n  .code-block .tk-cm { color: var(--charcoal-5); }\n\n  .medal-row { display: flex; gap: 6px; flex-wrap: wrap; }\n  .medal { width: 28px; height: 28px; border-radius: 50%; display: inline-block; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15); }\n\n  /* ─── PROPERTY FINGERPRINTS ─────────────────────── */\n  .props {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 18px;\n  }\n  .prop {\n    border: 1px solid var(--light-grey-1);\n    border-radius: 2px;\n    overflow: hidden;\n    background: var(--white);\n  }\n  .prop .band {\n    height: 78px;\n    padding: 14px 16px;\n    display: flex; flex-direction: column; justify-content: space-between;\n    color: var(--white);\n    position: relative;\n  }\n  .prop .band .name {\n    font-family: var(--serif);\n    font-size: 24px;\n    line-height: 1;\n  }\n  .prop .band .url {\n    font-family: var(--mono);\n    font-size: 9.5px;\n    letter-spacing: 0.06em;\n    opacity: 0.7;\n  }\n  .prop .body {\n    padding: 14px 16px 16px;\n    font-family: var(--sans);\n    font-size: 12px;\n    line-height: 1.55;\n    color: var(--charcoal-3);\n    min-height: 130px;\n  }\n  .prop .accents { display: flex; gap: 4px; margin-bottom: 10px; }\n  .prop .accents span { width: 18px; height: 18px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.08); }\n  .prop .uniq { color: var(--charcoal-1); }\n  .prop .ft  { color: var(--charcoal-4); font-family: var(--mono); font-size: 10px; margin-top: 6px; letter-spacing: 0.04em; }\n\n  /* per-prop band overrides */\n  .band.bg-charcoal-1 { background: var(--charcoal-1); }\n  .band.bg-charcoal-2 { background: var(--charcoal-2); }\n  .band.bg-primary    { background: var(--primary); }\n  .band.bg-news       { background: var(--news-blue); }\n  .band.bg-about      { background: var(--about-surface); color: var(--charcoal-1); }\n  .band.bg-events     { background: var(--white); color: var(--charcoal-1); border-bottom: 1px solid var(--light-grey-1); }\n  .band.bg-jobs       { background: var(--light-grey-2); color: var(--charcoal-1); }\n  .band.bg-blocks     { background: var(--charcoal-2); }\n  .band.bg-learn      { background: var(--charcoal-2); }\n  .band.bg-photos     { background: var(--charcoal-2); }\n  .band.bg-patterns   { background: var(--charcoal-2); }\n  .band.bg-make       { background: var(--charcoal-2); }\n  .band.bg-5ftf       { background: var(--charcoal-1); }\n  .band.bg-forums     { background: var(--charcoal-2); }\n  .band.bg-dev        { background: var(--charcoal-2); }\n  .band.bg-docs       { background: var(--charcoal-2); }\n  .band.bg-themes     { background: var(--charcoal-2); }\n  .band.bg-plugins    { background: var(--charcoal-2); }\n  .band.bg-profiles   { background: var(--white); color: var(--charcoal-1); border-bottom: 1px solid var(--light-grey-1); }\n  .band.bg-showcase   { background: var(--charcoal-1); }\n  .band.bg-enterprise { background: var(--primary); }\n\n  /* ─── FOOTER ─────────────────────────────────────── */\n  footer {\n    background: var(--charcoal-1);\n    color: var(--light-grey-1);\n    padding: 60px 0 50px;\n    margin-top: 0;\n  }\n  footer .page { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 60px; }\n  footer h5 {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--charcoal-5);\n    margin: 0 0 14px;\n    font-weight: 500;\n  }\n  footer ul { list-style: none; padding: 0; margin: 0; font-family: var(--mono); font-size: 11px; line-height: 1.9; }\n  footer ul a { color: var(--blueberry-2); text-decoration: none; }\n  footer .stat { font-family: var(--serif); font-size: 50px; color: var(--white); line-height: 1; }\n  footer .stat + .stat-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--charcoal-5); margin-top: 6px; }\n\n  /* ─── TABLE ──────────────────────────────────────── */\n  .typescale-table {\n    width: 100%;\n    border-collapse: collapse;\n    font-family: var(--mono);\n    font-size: 11px;\n  }\n  .typescale-table th, .typescale-table td {\n    padding: 10px 14px;\n    text-align: left;\n    border-bottom: 1px solid var(--light-grey-1);\n    color: var(--charcoal-2);\n  }\n  .typescale-table th {\n    font-weight: 500;\n    color: var(--charcoal-4);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    font-size: 10px;\n  }\n  .typescale-table tr:hover td { background: var(--light-grey-2); }\n  .typescale-table .group {\n    background: var(--charcoal-2);\n    color: var(--white);\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n  }\n  .typescale-table .group td { color: var(--white); padding: 12px 14px; border-bottom: 0; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ─────────────────────── HERO ─────────────────────── -->\n<header class=\"hero\">\n  <div class=\"page\">\n    <div>\n      <p class=\"eyebrow\">DESIGN.md · visual sample<\u002Fp>\n      <h1>One file,<br>a <em>federated<\u002Fem><br>visual brand.<\u002Fh1>\n      <p class=\"lede\">A single DESIGN.md captures a sprawling design system across nineteen properties — colors, type, components, layout, and per-section fingerprints — in a form a coding agent can read end-to-end.<\u002Fp>\n    <\u002Fdiv>\n    <dl class=\"meta\">\n      <dt>FILE<\u002Fdt><dd>DESIGN.md<\u002Fdd>\n      <dt>SIZE<\u002Fdt><dd>59,498 bytes<\u002Fdd>\n      <dt>VERSION<\u002Fdt><dd>alpha<\u002Fdd>\n      <dt>SUBJECT<\u002Fdt><dd>WordPress.org design system<\u002Fdd>\n      <dt>SOURCE<\u002Fdt><dd><a href=\"orgdesignmd\">orgdesignmd<\u002Fa><\u002Fdd>\n      <dt>SPEC<\u002Fdt><dd><a href=\"https://github.com/google-labs-code/design.md\">google-labs-code/design.md<\u002Fa><\u002Fdd>\n      <dt>STRUCTURE<\u002Fdt><dd>YAML front-matter + Markdown prose<\u002Fdd>\n      <dt>TOOLING<\u002Fdt><dd>@google/design.md → Tailwind v4, DTCG JSON<\u002Fdd>     <div class=\"badge-cell\" style=\"background:#177F6A\"><span class=\"name\">sustainability-c<\u002Fspan><span class=\"hex\">#177F6A<\u002Fspan><\u002Fdiv>\n      <div class=\"badge-cell light\" style=\"background:#FFC107\"><span class=\"name\">test<\u002Fspan><span class=\"hex\">#FFC107<\u002Fspan><\u002Fdiv>\n      <div class=\"badge-cell light\" style=\"background:#FBA16C\"><span class=\"name\">mobile<\u002Fspan><span class=\"hex\">#FBA16C<\u002Fspan><\u002Fdiv>\n      <div class=\"badge-cell\" style=\"background:#AE47F2\"><span class=\"name\">credits-grad<\u002Fspan><span class=\"hex\">#AE47F2<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────── TYPE ─────────────────────── -->\n<section style=\"background: var(--light-grey-2);\">\n  <div class=\"page\">\n    <div class=\"section-head\">\n      <div class=\"section-num\"><strong>02<\u002Fstrong>Typography<\u002Fdiv>\n      <div>\n        <h2>Three faces, opinionated pairing.<\u002Fh2>\n        <p>EB Garamond carries editorial headlines. Inter does all the structural lifting — body, UI, labels — across weights 200–700. IBM Plex Mono handles code and the small-caps mono labels that thread through the system. About bends the rules: Courier Prime body, Inter display.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"subhead\">Global scale<\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">display-cta<small>EB Garamond<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-display-cta\">View all sites →<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">120px<\u002Fspan> / 1.0 / -0.02em<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">headline-1<small>EB Garamond<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-headline-1\">Democratize publishing.<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">70px<\u002Fspan> / 1.05 / -0.02em<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">headline-2<small>EB Garamond<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-headline-2\">A federated visual brand.<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">50px<\u002Fspan> / 1.2<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">headline-3<small>EB Garamond<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-headline-3\">Confident serif headlines, clean UI.<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">36px<\u002Fspan> / 1.28<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">headline-4<small>EB Garamond<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-headline-4\">Editorial open source.<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">30px<\u002Fspan> / 1.33<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">headline-5 / 6<small>EB Garamond<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-headline-5\">A distinctive 2px button radius — a brand marker.<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">26px<\u002Fspan> / <span class=\"v\">22px<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">body-lg<small>Inter 400<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-body-lg\">The brand should feel trustworthy, welcoming, and technically credible. Tokens are verified against live CSS.<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">20px<\u002Fspan> / 1.7<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">body-md<small>Inter 400<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-body-md\">Most properties use wporg-parent-2021 (FSE child themes or main-theme patterns). Profiles and Jobs are structural outliers.<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">16px<\u002Fspan> / 1.875<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">body-sm / xs<small>Inter 400<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample\">\n        <div class=\"t-body-sm\">Small-text body — used for meta, captions, filter labels, and dense lists. Stays readable at 14px.<\u002Fdiv>\n        <div class=\"t-body-xs\" style=\"color:var(--charcoal-4); margin-top:6px;\">Extra-small — 12px label cells, badge captions, footer notes.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">14px<\u002Fspan> / <span class=\"v\">12px<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">label-md / nav<small>Inter 600 / 400<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample\">\n        <span class=\"t-label-md\">DOWNLOAD WORDPRESS<\u002Fspan> &nbsp;·&nbsp;\n        <span class=\"t-label-nav\">News &nbsp; Plugins &nbsp; Themes<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">16px / 600<\u002Fspan><br>16px / 400<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div class=\"name\">code-inline<small>IBM Plex Mono<\u002Fsmall><\u002Fdiv>\n      <div class=\"sample t-code\">primary: \"#3858E9\"  rounded.sm: 2px  spacing.edge: 80px<\u002Fdiv>\n      <div class=\"spec\"><span class=\"v\">14px<\u002Fspan> / 1.5<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"subhead\">Property-specific scale highlights<\u002Fdiv>\n    <table class=\"typescale-table\">\n      <thead><tr><th style=\"width:22%\">Token<\u002Fth><th style=\"width:28%\">Family<\u002Fth><th style=\"width:14%\">Size<\u002Fth><th style=\"width:14%\">Weight<\u002Fth><th>Where it appears<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr class=\"group\"><td colspan=\"5\">NEWS<\u002Ftd><\u002Ftr>\n        <tr><td>news-hero-title<\u002Ftd><td>EB Garamond<\u002Ftd><td>160px<\u002Ftd><td>400<\u002Ftd><td>\"News\" wordmark on front-page blue band<\u002Ftd><\u002Ftr>\n        <tr><td>news-release-version<\u002Ftd><td>Inter<\u002Ftd><td>160px<\u002Ftd><td>200<\u002Ftd><td>Giant release numeral on latest-release section<\u002Ftd><\u002Ftr>\n        <tr class=\"group\"><td colspan=\"5\">ABOUT<\u002Ftd><\u002Ftr>\n        <tr><td>about-cover-title<\u002Ftd><td>Inter<\u002Ftd><td>90px<\u002Ftd><td>400<\u002Ftd><td>Lowercase editorial cover — letter-spacing −0.05em<\u002Ftd><\u002Ftr>\n        <tr><td>about-body<\u002Ftd><td>Courier Prime<\u002Ftd><td>16px<\u002Ftd><td>400<\u002Ftd><td>All body copy, labels, link columns<\u002Ftd><\u002Ftr>\n        <tr><td>about-freedom-number<\u002Ftd><td>Inter<\u002Ftd><td>160px<\u002Ftd><td>200<\u002Ftd><td>GPL freedoms 0–3 row<\u002Ftd><\u002Ftr>\n        <tr class=\"group\"><td colspan=\"5\">ENTERPRISE<\u002Ftd><\u002Ftr>\n        <tr><td>enterprise-cover-title<\u002Ftd><td>EB Garamond<\u002Ftd><td>120px<\u002Ftd><td>400<\u002Ftd><td>Blueberry cover H1<\u002Ftd><\u002Ftr>\n        <tr><td>enterprise-cta-heading<\u002Ftd><td>Inter<\u002Ftd><td>98px<\u002Ftd><td>300<\u002Ftd><td>\"Get WordPress\" linked display, arrow style<\u002Ftd><\u002Ftr>\n        <tr class=\"group\"><td colspan=\"5\">SHOWCASE<\u002Ftd><\u002Ftr>\n        <tr><td>showcase-section-heading<\u002Ftd><td>Inter<\u002Ftd><td>120px<\u002Ftd><td>300<\u002Ftd><td>\"View all sites →\" link with arrow<\u002Ftd><\u002Ftr>\n        <tr><td>showcase-hero-title<\u002Ftd><td>EB Garamond<\u002Ftd><td>50px<\u002Ftd><td>400<\u002Ftd><td>Hero + single-site titles<\u002Ftd><\u002Ftr>\n        <tr class=\"group\"><td colspan=\"5\">DEVELOPER · LEARN · BLOCKS<\u002Ftd><\u002Ftr>\n        <tr><td>dev-code-reference-title<\u002Ftd><td>IBM Plex Mono<\u002Ftd><td>24px<\u002Ftd><td>400<\u002Ftd><td>API reference H1 (function/hook/class)<\u002Ftd><\u002Ftr>\n        <tr><td>learn-display-heading<\u002Ftd><td>EB Garamond<\u002Ftd><td>70px<\u002Ftd><td>400<\u002Ftd><td>\"Share your WordPress expertise\" promo<\u002Ftd><\u002Ftr>\n        <tr><td>blocks-hero-title<\u002Ftd><td>Inter<\u002Ftd><td>70px<\u002Ftd><td>400<\u002Ftd><td>Hero H1 — Inter, not EB Garamond<\u002Ftd><\u002Ftr>\n        <tr class=\"group\"><td colspan=\"5\">PROFILES (BuddyPress)<\u002Ftd><\u002Ftr>\n        <tr><td>profiles-impact-stat<\u002Ftd><td>EB Garamond<\u002Ftd><td>52px<\u002Ftd><td>500<\u002Ftd><td>30/90/365-day contribution tiles<\u002Ftd><\u002Ftr>\n        <tr><td>profiles-label-chip<\u002Ftd><td>IBM Plex Mono<\u002Ftd><td>10px<\u002Ftd><td>500<\u002Ftd><td>Tracked 0.14em team chip labels<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────── LAYOUT & SHAPES ─────────────────────── -->\n<section>\n  <div class=\"page\">\n    <div class=\"section-head\">\n      <div class=\"section-num\"><strong>03<\u002Fstrong>Layout · Spacing · Shapes<\u002Fdiv>\n      <div>\n        <h2>680 / 1160, with two outliers.<\u002Fh2>\n        <p>Two content widths cover the whole system. Photos and Showcase break out to 1760px for image-first directories; Events sits at 1600px. The radius scale is short on purpose — 2px is the brand marker, 20px is reserved for screenshot frames.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"two-col\">\n      <div>\n        <div class=\"subhead\">Spacing scale<\u002Fdiv>\n        <ul class=\"spacing-list\">\n          <li><span class=\"name\">xs<\u002Fspan><div class=\"vis\" style=\"width:4px\"><\u002Fdiv><span class=\"val\">4px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">sm<\u002Fspan><div class=\"vis\" style=\"width:10px\"><\u002Fdiv><span class=\"val\">10px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">md<\u002Fspan><div class=\"vis\" style=\"width:20px\"><\u002Fdiv><span class=\"val\">20px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">lg<\u002Fspan><div class=\"vis\" style=\"width:30px\"><\u002Fdiv><span class=\"val\">30px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">xl<\u002Fspan><div class=\"vis\" style=\"width:50px\"><\u002Fdiv><span class=\"val\">50px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">2xl<\u002Fspan><div class=\"vis\" style=\"width:80px\"><\u002Fdiv><span class=\"val\">80px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">edge<\u002Fspan><div class=\"vis\" style=\"width:80px\"><\u002Fdiv><span class=\"val\">80px<\u002Fspan><\u002Fli>\n        <\u002Ful>\n\n        <div class=\"subhead\">Content widths<\u002Fdiv>\n        <div class=\"width-bars\">\n          <div class=\"bar\"><div class=\"fill\" style=\"width:38.6%\"><\u002Fdiv><div class=\"lbl\"><span>content-max<\u002Fspan><span>680px<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"bar\"><div class=\"fill\" style=\"width:65.9%\"><\u002Fdiv><div class=\"lbl\"><span>wide-max<\u002Fspan><span>1160px<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"bar\"><div class=\"fill\" style=\"width:90.9%\"><\u002Fdiv><div class=\"lbl\"><span>events-wide-max<\u002Fspan><span>1600px<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"bar\"><div class=\"fill\" style=\"width:100%\"><\u002Fdiv><div class=\"lbl\"><span>photos / showcase<\u002Fspan><span>1760px<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family:var(--mono); font-size:11px; color:var(--charcoal-4); margin-top:14px;\">docs-sidebar 248px · docs-column-gap 40px<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"subhead\">Rounded — 7 tokens<\u002Fdiv>\n        <ul class=\"radius-list\">\n          <li><span class=\"name\">none<\u002Fspan><div class=\"vis\" style=\"border-radius:0\"><\u002Fdiv><span class=\"val\">0px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">sm <em style=\"color:var(--primary);font-style:normal;font-family:var(--sans);font-size:9px;letter-spacing:0.1em;margin-left:6px;\">BRAND MARKER<\u002Fem><\u002Fspan><div class=\"vis\" style=\"border-radius:2px\"><\u002Fdiv><span class=\"val\">2px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">md<\u002Fspan><div class=\"vis\" style=\"border-radius:4px\"><\u002Fdiv><span class=\"val\">4px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">lg<\u002Fspan><div class=\"vis\" style=\"border-radius:8px\"><\u002Fdiv><span class=\"val\">8px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">xl<\u002Fspan><div class=\"vis\" style=\"border-radius:12px\"><\u002Fdiv><span class=\"val\">12px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">showcase<\u002Fspan><div class=\"vis\" style=\"border-radius:20px\"><\u002Fdiv><span class=\"val\">20px<\u002Fspan><\u002Fli>\n          <li><span class=\"name\">full<\u002Fspan><div class=\"vis\" style=\"border-radius:9999px\"><\u002Fdiv><span class=\"val\">9999px<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────── COMPONENTS ─────────────────────── -->\n<section style=\"background: var(--light-grey-2);\">\n  <div class=\"page\">\n    <div class=\"section-head\">\n      <div class=\"section-num\"><strong>04<\u002Fstrong>Components<\u002Fdiv>\n      <div>\n        <h2>Token-referenced UI atoms.<\u002Fh2>\n        <p>Each component declares its tokens — backgroundColor, textColor, typography, rounded, padding — and inherits the rest. ~70 components are documented, from shared wporg primitives to property-specific patterns (showcase frames, jobs filter pills, syntax badges, contribution medals).<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"comp-grid\">\n\n      <div class=\"comp span-6\">\n        <p class=\"comp-title\">button-primary · button-outline · 2px radius<\u002Fp>\n        <div class=\"btn-row\">\n          <button class=\"btn primary\">Download WordPress<\u002Fbutton>\n          <button class=\"btn outline\">Learn more<\u002Fbutton>\n          <button class=\"btn success\">Mark complete<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"btn-row\" style=\"margin-top:12px; padding:18px; background:var(--charcoal-1); border-radius:2px;\">\n          <button class=\"btn primary\">Get involved<\u n><span style=\"background:#BD8600\"><\u002Fspan><\u002Fdiv>\n          <div class=\"uniq\">Plex Mono API titles, lemon-3 version notice, syntax type colors (fn/hook/class/method), Developer Blog cards.<\u002Fdiv>\n          <div class=\"ft\">wporg-developer-2023<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"prop\">\n        <div class=\"band bg-profiles\"><div class=\"name\">Profiles<\u002Fdiv><div class=\"url\">profiles.wordpress.org<\u002Fdiv><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"accents\"><span style=\"background:#1D2327\"><\u002Fspan><span style=\"background:#F6F7F7\"><\u002Fspan><span style=\"background:#F97316\"><\u002Fspan><\u002Fdiv>\n          <div class=\"uniq\">BuddyPress legacy theme (structural outlier). 52px serif impact stats, team chips, contribution medals, activity feed.<\u002Fdiv>\n          <div class=\"ft\">BuddyPress · profiles.wordpress.org child<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"prop\">\n        <div class=\"band bg-jobs\"><div class=\"name\">Jobs<\u002Fdiv><div class=\"url\">jobs.wordpress.net<\u002Fdiv><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"accents\"><span style=\"background:#F6F6F6\"><\u002Fspan><span style=\"background:#33F078\"><\u002Fspan><span style=\"background:#1E1E1E\"><\u002Fspan><\u002Fdiv>\n          <div class=\"uniq\">Standalone classic theme (jobswp v2.0.0). Acid-green active filter pills, 3-column job grid, 340px sticky sidebar.<\u002Fdiv>\n          <div class=\"ft\">jobswp · standalone<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────── DON'TS / DO'S ─────────────────────── -->\n<section style=\"background: var(--charcoal-1); color: var(--white); border: 0;\">\n  <div class=\"page\">\n    <div class=\"section-head\">\n      <div class=\"section-num\" style=\"color: var(--charcoal-5);\"><strong style=\"color: var(--blueberry-2);\">06<\u002Fstrong>Do's &amp; Don'ts<\u002Fdiv>\n      <div>\n        <h2 style=\"color: var(--white);\">Section 8 of the spec — guardrails.<\u002Fh2>\n        <p style=\"color: var(--light-grey-1);\">Global rules live in DESIGN.md; section-specific ones in the per-stack guides. A few representative entries:<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"comp-grid\" style=\"color: var(--charcoal-1);\">\n      <div class=\"comp span-4\" style=\"background: var(--acid-green-3); border-color: transparent;\">\n        <p class=\"comp-title\" style=\"color: #006020;\">DO<\u002Fp>\n        <div style=\"font-family: var(--serif); font-size: 22px; line-height: 1.3; margin-bottom: 10px;\">Pair EB Garamond with Inter UI.<\u002Fdiv>\n        <p style=\"font-family: var(--sans); font-size: 13px; color: var(--charcoal-3); margin: 0;\">Serif for editorial headlines, sans for everything structural. Mono is for code and small-cap labels.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"comp span-4\" style=\"background: var(--acid-green-3); border-color: transparent;\">\n        <p class=\"comp-title\" style=\"color: #006020;\">DO<\u002Fp>\n        <div style=\"font-family: var(--serif); font-size: 22px; line-height: 1.3; margin-bottom: 10px;\">Use 2px button radius.<\u002Fdiv>\n        <p style=\"font-family: var(--sans); font-size: 13px; color: var(--charcoal-3); margin: 0;\">It's the brand marker — recognizable across every property. Showcase uses 20px only for screenshot frames; Profiles uses 8px only for activity cards.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"comp span-4\" style=\"background: var(--acid-green-3); border-color: transparent;\">\n        <p class=\"comp-title\" style=\"color: #006020;\">DO<\u002Fp>\n        <div style=\"font-family: var(--serif); font-size: 22px; line-height: 1.3; margin-bottom: 10px;\">Reserve campaign accents for feature blocks.<\u002Fdiv>\n        <p style=\"font-family: var(--sans); font-size: 13px; color: var(--charcoal-3); margin: 0;\">Pomegrade, Acid Green, Lemon, and Purple are for marketing moments — not body UI.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"comp span-4\" style=\"background: var(--pomegrade-3); border-color: transparent;\">\n        <p class=\"comp-title\" style=\"color: #B5320E;\">DON'T<\u002Fp>\n        <div style=\"font-family: var(--serif); font-size: 22px; line-height: 1.3; margin-bottom: 10px;\">Don't flatten the federation.<\u002Fdiv>\n        <p style=\"font-family: var(--sans); font-size: 13px; color: var(--charcoal-3); margin: 0;\">Each property declares its own hero surface and accent. Don't normalize Photos to look like News, or Profiles to look like Plugins.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"comp span-4\" style=\"background: var(--pomegrade-3); border-color: transparent;\">\n        <p class=\"comp-title\" style=\"color: #B5320E;\">DON'T<\u002Fp>\n        <div style=\"font-family: var(--serif); font-size: 22px; line-height: 1.3; margin-bottom: 10px;\">Don't add card shadows.<\u002Fdiv>\n        <p style=\"font-family: var(--sans); font-size: 13px; color: var(--charcoal-3); margin: 0;\">Elevation is tonal. Showcase uses border frames; everything else relies on surface contrast, not box-shadow.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"comp span-4\" style=\"background: var(--pomegrade-3); border-color: transparent;\">\n        <p class=\"comp-title\" style=\"color: #B5320E;\">DON'T<\u002Fp>\n        <div style=\"font-family: var(--serif); font-size: 22px; line-height: 1.3; margin-bottom: 10px;\">Don't mix display faces.<\u002Fdiv>\n        <p style=\"font-family: var(--sans); font-size: 13px; color: var(--charcoal-3); margin: 0;\">About uses Inter display intentionally. Blocks uses Inter at 70px. Don't import either swap into other properties — the contrast is what makes them legible as their own thing.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────── FOOTER ─────────────────────── -->\n<footer>\n  <div class=\"page\">\n    <div>\n      <h5>File composition<\u002Fh5>\n      <div class=\"stat\">19<\u002Fdiv>\n      <div class=\"stat-label\">properties documented<\u002Fdiv>\n      <div class=\"stat\" style=\"font-size: 38px; margin-top: 24px;\">85+ · 70+ · 31<\u002Fdiv>\n      <div class=\"stat-label\">color tokens · components · badge classes<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <h5>Spec section order<\u002Fh5>\n      <ul>\n        <li>1 · Overview<\u002Fli>\n        <li>2 · Colors<\u002Fli>\n        <li>3 · Typography<\u002Fli>\n        <li>4 · Layout<\u002Fli>\n        <li>5 · Elevation &amp; Depth<\u002Fli>\n        <li>6 · Shapes<\u002Fli>\n        <li>7 · Components<\u002Fli>\n        <li>8 · Do's and Don'ts<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <h5>References<\u002Fh5>\n      <ul>\n        <li><a href=\"orgdesignmd\">orgdesignmd<\u002Fa><\u002Fli>\n        <li><a href=\"https://github.com/google-labs-code/design.md\">google-labs-code/design.md<\u002Fa><\u002Fli>\n        <li><a href=\"https://github.com/WordPress/wporg-parent-2021\">wporg-parent-2021<\u002Fa> — parent theme<\u002Fli>\n        <li><a href=\"https://make.wordpress.org/design/2024/09/05/advancing-the-wordpress-design-system/\">Advancing the WordPress Design System<\u002Fa><\u002Fli>\n      <\u002Ful>\n      <h5 style=\"margin-top: 30px;\">Exports<\u002Fh5>\n      <ul>\n        <li>theme.css (Tailwind v4 @theme)<\u002Fli>\n        <li>tokens.json (W3C DTCG)<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
